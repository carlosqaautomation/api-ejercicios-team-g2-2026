name: Pruebas Automaticas

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      #Pasos:
      #1. clonar el repositorio
      #2. descargar herramientas necesarias
      #2.1 configurar el java y maven
      #3. descargar dependencias del proyecto
      #4. ejecutar pruebas
      #5. generar reporte de pruebas
      - name: Clonar repositorio
        uses: actions/checkout@v6
      - name: Configurar Java y Maven
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '11'
      - name: Descarga dependencias y ejecuta pruebas
        run: mvn clean verify
      - name: Generar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v7
